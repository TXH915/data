<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析在线学习平台</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/theme/material-darker.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📊 Python数据分析学习平台</h1>
            <div class="achievements-badge" id="achievementsBadge">
                <span class="badge-icon">🏆</span>
                <span class="badge-count" id="badgeCount">0</span>
            </div>
        </div>
    </header>

    <main class="main">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📚 课程目录</h2>
            </div>
            <nav class="project-nav" id="projectNav"></nav>
        </aside>

        <section class="content" id="content">
            <div class="project-header" id="projectHeader">
                <span class="level-badge" id="levelBadge"></span>
                <h2 id="projectTitle">选择一个项目开始学习</h2>
            </div>

            <div class="panels-container" id="panelsContainer">
                <div class="panel theory-panel" id="theoryPanel">
                    <div class="panel-header">
                        <h3>📖 理论知识</h3>
                        <button class="btn btn-small collapse-btn" onclick="togglePanel('theoryPanel')">−</button>
                    </div>
                    <div class="panel-content scrollable" id="theoryContent"></div>
                </div>

                <div class="resizer vertical" id="resizerV1"></div>

                <div class="panel center-panel">
                    <div class="panel code-panel" id="codePanel">
                        <div class="library-info" id="libraryInfo">
                            <div class="title">
                                <span>📦</span>
                                <span>预装数据科学库</span>
                                <button class="btn btn-small collapse-btn" onclick="togglePanel('libraryInfo')">−</button>
                            </div>
                            <div class="packages">
                                <span class="pkg-tag pkg-loading">numpy...</span>
                                <span class="pkg-tag pkg-loading">pandas...</span>
                                <span class="pkg-tag pkg-loading">matplotlib...</span>
                                <span class="pkg-tag pkg-loading">scipy...</span>
                                <span class="pkg-tag pkg-loading">scikit-learn...</span>
                                <span class="pkg-tag pkg-loading">seaborn...</span>
                            </div>
                        </div>
                        <div class="panel-header">
                            <h3>💻 代码练习</h3>
                            <div class="code-actions">
                                <div class="code-header-extra">
                                    <div class="status-indicator" id="statusIndicator"></div>
                                </div>
                                <button class="btn btn-small collapse-btn" onclick="togglePanel('codePanel')">−</button>
                                <button class="btn btn-secondary" id="resetBtn">🔄 重置</button>
                                <button class="btn btn-primary" id="runBtn">▶️ 运行</button>
                            </div>
                        </div>
                        <div class="panel-content code-scrollable">
                            <textarea id="codeEditor"></textarea>
                        </div>
                    </div>

                    <div class="resizer horizontal" id="resizer1"></div>

                    <div class="panel output-panel" id="outputPanel">
                        <div class="panel-header">
                            <h3>📤 输出结果</h3>
                            <div>
                                <button class="btn btn-small collapse-btn" onclick="togglePanel('outputPanel')">−</button>
                                <button class="btn btn-small" id="clearOutputBtn">🗑️ 清空</button>
                            </div>
                        </div>
                        <div class="panel-content scrollable output-scrollable" id="outputContent">
                            <div class="output-content-wrapper">
                                <div class="placeholder">运行代码后结果将显示在这里 - 此内容宽度超过800像素以确保水平滚动条显示 - 您可以拖动滚动条查看更多内容</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="resizer vertical" id="resizerV2"></div>

                <div class="panel right-panel">
                    <div class="panel solution-panel" id="solutionPanel">
                        <div class="panel-header">
                            <h3>✅ 参考答案</h3>
                            <div>
                                <button class="btn btn-small collapse-btn" onclick="togglePanel('solutionPanel')">−</button>
                                <button class="btn btn-small" id="toggleSolutionBtn">👁️ 显示</button>
                            </div>
                        </div>
                        <div class="panel-content scrollable solution-scrollable" id="solutionContent">
                            <div class="placeholder">点击显示参考答案</div>
                        </div>
                    </div>

                    <div class="resizer horizontal" id="resizer2"></div>

                    <div class="panel quiz-panel" id="quizPanel">
                        <div class="panel-header">
                            <h3>📝 测评练习</h3>
                            <button class="btn btn-small collapse-btn" onclick="togglePanel('quizPanel')">−</button>
                        </div>
                        <div class="panel-content scrollable" id="quizContent">
                            <div class="placeholder">选择项目后显示测评</div>
                        </div>
                    </div>

                    <div class="resizer horizontal" id="resizer3"></div>

                    <div class="panel exam-panel" id="examPanel">
                        <div class="panel-header">
                            <h3>📋 阶段考试</h3>
                            <div>
                                <button class="btn btn-small collapse-btn" onclick="togglePanel('examPanel')">−</button>
                                <button class="btn btn-small" id="startExamBtn">开始考试</button>
                            </div>
                        </div>
                        <div class="panel-content scrollable" id="examContent">
                            <div class="placeholder">点击"开始考试"进入考试模式</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal" id="achievementsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏆 成就系统</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="achievementsContent"></div>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/python-runner.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
